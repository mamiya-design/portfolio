<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>カフェLP</title>
        <meta name="viewport" content="width=divice-width, initial-scale=1.0">

    <!--オリジナルCSS-->
    <link rel="stylesheet" href="index.css">
    </head>

    <body>
        <header>
            <div class="fv">
                <h2>毎日に、ほっとする一杯を</h2>
                <p>厳選したコーヒーと落ち着いた空間で<br>
                ゆったりとした時間をお過ごしください</p>
            </div>
        </header>

        <section class="menu">
            <h2>こだわりのコーヒーやスイーツ、期間限定のメニューもご用意しております。</h2>
            <div class="menu-flex">
                <div class="menu-card">
                    <img src="menu-img1.jpg" alt="カフェラテ">
                    <p class="menu-text">店長こだわりの</p>
                    <h2>カフェラテ</h2>
                    <p class="price">¥530</p>
                </div>

                <div class="menu-card">
                    <img src="menu-img2.jpg" alt="レアチーズタルト">
                    <p class="menu-text">絶品♡</p>
                    <h2>レアチーズタルト</h2>
                    <p class="price">¥680円</p>
                </div>
                
                <div class="menu-card">
                    <img src="menu-img3.jpg" alt="いちごのパフェ">
                    <p class="menu-text">期間限定！見た目も可愛い♡</p>
                    <h2>いちごのパフェ</h2>
                    <p class="price">¥700円</p>
                </div>
            </div>
        </section>

        <section class="location">
            <p>〇〇駅から徒歩５分の場所にございます。</p>
            <p>お気軽にお立ち寄りください。</p>
        </section>
    </body>
</html>
